name: rag-chatbot

channels:
  - conda-forge

dependencies:
  - python=3.13.13
  - pip=26.1.1

  # Web framework
  - fastapi=0.136.1
  - uvicorn=0.47.0
  - uvicorn-standard=0.47.0
  - jinja2=3.1.6
  - python-multipart=0.0.29

  # Environment variables and settings
  - python-dotenv=1.2.2
  - pydantic=2.13.4
  - pydantic-settings=2.14.1

  # LangChain + OpenAI
  - langchain-core=1.4.0
  - langchain-community=0.3.31
  - langchain-openai=1.2.1
  - langchain-text-splitters=0.3.11
  - openai=2.37.0

  # Vector database / document loading
  - faiss-cpu=1.10.0
  - pypdf=6.11.0

  # Testing
  - pytest=9.0.3
  - httpx=0.28.1